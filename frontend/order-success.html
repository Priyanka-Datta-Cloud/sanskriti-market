<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Confirmed | Sanskriti Market</title>
  <meta name="robots" content="noindex">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/main.css" rel="stylesheet">
  <style>
    body { background: #F5F0E8; padding-top: 80px; min-height: 100vh; display: flex; align-items: center; }
    .success-card { background: #fff; border-radius: 20px; padding: 48px 40px; text-align: center; box-shadow: 0 4px 40px rgba(139,41,66,0.1); max-width: 560px; margin: 0 auto; }
    .success-icon { width: 88px; height: 88px; background: linear-gradient(135deg,#8B2942,#C9A962); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; animation: popIn .5s cubic-bezier(.175,.885,.32,1.275); }
    @keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .confetti { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 0; }
    .confetti-piece { position: absolute; width: 10px; height: 10px; border-radius: 2px; animation: fall linear forwards; }
    @keyframes fall { 0% { transform: translateY(-20px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
    .detail-row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 0.95rem; border-bottom: 1px solid #F5F0E8; }
    .detail-row:last-child { border: none; }
  </style>
</head>
<body>
  <div class="confetti" id="confetti"></div>
  <div class="container position-relative">
    <div class="success-card">
      <div class="success-icon">
        <i class="bi bi-check-lg" style="font-size:2.5rem;color:#fff"></i>
      </div>
      <h1 style="font-family:'Playfair Display',serif;color:#8B2942;font-size:2rem;margin-bottom:8px">Order Confirmed!</h1>
      <p style="color:#8B7355;font-size:1rem;margin-bottom:28px">Thank you for supporting Indian artisans 🪔<br>A confirmation email has been sent to you.</p>
      <div id="order-details" style="background:#F5F0E8;border-radius:12px;padding:20px;margin-bottom:28px;text-align:left"></div>
      <div class="d-grid gap-2">
        <a href="/orders.html" class="btn btn-sanskriti btn-lg">View My Orders</a>
        <a href="/products.html" class="btn btn-outline-secondary btn-lg">Continue Shopping</a>
      </div>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const orderId = params.get('id');
    const paid = params.get('paid');

    async function loadOrder() {
      if (!orderId) return;
      try {
        const res = await API.get('/api/orders/' + orderId);
        const o = res.data.order;
        document.getElementById('order-details').innerHTML = `
          <div class="detail-row"><span style="color:#8B7355">Order Number</span><strong>#${o.orderNumber}</strong></div>
          <div class="detail-row"><span style="color:#8B7355">Payment</span><span style="color:${paid ? '#28a745' : '#8B7355'}">${paid ? '✓ Paid via Razorpay' : 'Cash on Delivery'}</span></div>
          <div class="detail-row"><span style="color:#8B7355">Items</span><span>${o.items.length} item(s)</span></div>
          <div class="detail-row"><span style="color:#8B7355">Total</span><strong style="color:#8B2942">₹${Number(o.total).toLocaleString('en-IN')}</strong></div>
          <div class="detail-row"><span style="color:#8B7355">Estimated Delivery</span><span>5–7 business days</span></div>`;
      } catch {}
    }

    function spawnConfetti() {
      const colors = ['#8B2942','#C9A962','#F5F0E8','#4A7C59','#2196F3'];
      for (let i = 0; i < 80; i++) {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.cssText = `left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*2}s;border-radius:${Math.random()>0.5?'50%':'2px'}`;
        document.getElementById('confetti').appendChild(el);
      }
      setTimeout(() => document.getElementById('confetti').innerHTML = '', 5000);
    }

    loadOrder();
    spawnConfetti();
  </script>
</body>
</html>
