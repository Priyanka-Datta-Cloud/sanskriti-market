<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Seller Orders | Sanskriti Market</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="/css/main.css" rel="stylesheet"><link href="/css/components.css" rel="stylesheet">
</head>
<body>
<div class="dashboard-sidebar"><div class="brand">Sanskriti Seller</div>
<ul class="sidebar-nav"><li><a href="/seller/dashboard.html"><i class="bi bi-grid"></i> Dashboard</a></li>
<li><a href="/seller/products.html"><i class="bi bi-box"></i> Products</a></li>
<li><a href="/seller/orders.html" class="active"><i class="bi bi-receipt"></i> Orders</a></li>
<li><a href="/seller/settings.html"><i class="bi bi-gear"></i> Settings</a></li></ul></div>
<div class="dashboard-main"><h2 class="mb-4">Orders</h2>
<div class="table-sanskriti"><table class="table mb-0"><thead><tr><th>Order #</th><th>Customer</th><th>Total</th><th>Status</th><th>Date</th></tr></thead><tbody id="orders-table"></tbody></table></div></div>
<script src="/js/api.js"></script><script src="/js/auth.js"></script><script src="/js/main.js"></script>
<script>document.addEventListener('DOMContentLoaded',async()=>{if(!Auth.requireRole('seller'))return;
const r=await api.seller.orders();document.getElementById('orders-table').innerHTML=(r.data.orders||[]).map(o=>`<tr><td>${o.orderNumber}</td><td>${o.user?.name||'-'}</td><td>${Utils.formatPrice(o.total)}</td><td><span class="status-badge ${o.status}">${o.status}</span></td><td>${new Date(o.createdAt).toLocaleDateString()}</td></tr>`).join('');});</script></body></html>
