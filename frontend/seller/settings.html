<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Store Settings | Sanskriti Market</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="/css/main.css" rel="stylesheet"><link href="/css/components.css" rel="stylesheet">
</head>
<body>
<div class="dashboard-sidebar"><div class="brand">Sanskriti Seller</div>
<ul class="sidebar-nav"><li><a href="/seller/dashboard.html"><i class="bi bi-grid"></i> Dashboard</a></li>
<li><a href="/seller/products.html"><i class="bi bi-box"></i> Products</a></li>
<li><a href="/seller/orders.html"><i class="bi bi-receipt"></i> Orders</a></li>
<li><a href="/seller/settings.html" class="active"><i class="bi bi-gear"></i> Settings</a></li></ul></div>
<div class="dashboard-main"><h2 class="mb-4">Store Settings</h2>
<form id="store-form" class="col-lg-8"><input class="form-control form-control-sanskriti mb-3" id="s-name" placeholder="Store Name">
<input class="form-control form-control-sanskriti mb-3" id="s-tagline" placeholder="Tagline">
<textarea class="form-control form-control-sanskriti mb-3" id="s-desc" rows="4" placeholder="Description"></textarea>
<div class="row"><div class="col-6"><input class="form-control form-control-sanskriti mb-3" id="s-city" placeholder="City"></div>
<div class="col-6"><input class="form-control form-control-sanskriti mb-3" id="s-state" placeholder="State"></div></div>
<button type="submit" class="btn-sanskriti">Save Changes</button></form></div>
<script src="/js/api.js"></script><script src="/js/auth.js"></script><script src="/js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded',async()=>{if(!Auth.requireRole('seller'))return;const r=await api.stores.getMy();const s=r.data.store;
document.getElementById('s-name').value=s.name||'';document.getElementById('s-tagline').value=s.tagline||'';document.getElementById('s-desc').value=s.description||'';
document.getElementById('s-city').value=s.location?.city||'';document.getElementById('s-state').value=s.location?.state||'';});
document.getElementById('store-form').addEventListener('submit',async e=>{e.preventDefault();await api.stores.update({name:document.getElementById('s-name').value,tagline:document.getElementById('s-tagline').value,description:document.getElementById('s-desc').value,location:{city:document.getElementById('s-city').value,state:document.getElementById('s-state').value}});Utils.showToast('Saved!','success');});
</script></body></html>
