<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cart | Sanskriti Market</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="/css/main.css" rel="stylesheet"><link href="/css/components.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-sanskriti fixed-top"><div class="container"><a class="navbar-brand" href="/">Sanskriti <span>Market</span></a></div></nav>
<main class="container" style="padding-top:100px;padding-bottom:3rem"><h1 class="h3 mb-4">Shopping Cart</h1>
<div class="row"><div class="col-lg-8" id="cart-items"><div class="loading-spinner"></div></div>
<div class="col-lg-4"><div class="cart-summary" id="cart-summary"></div></div></div></main>
<script src="/js/api.js"></script><script src="/js/auth.js"></script><script src="/js/main.js"></script><script src="/js/cart.js"></script>
<script>
async function renderCart(){if(!Auth.requireAuth())return;try{const r=await api.cart.get();const cart=r.data.cart;const subtotal=r.data.subtotal||0;
if(!cart.items.length){document.getElementById('cart-items').innerHTML='<div class="empty-state"><i class="bi bi-bag"></i><h4>Cart is empty</h4><a href="/products.html" class="btn-sanskriti">Shop Now</a></div>';return;}
document.getElementById('cart-items').innerHTML=cart.items.map(i=>`<div class="cart-item"><div class="cart-item-image"><img src="${i.product?.images?.[0]?.url||''}" alt=""></div><div class="flex-grow-1"><h6>${i.product?.name}</h6><p>${Utils.formatPrice(i.product?.price)}</p></div><div><strong>${Utils.formatPrice(i.product?.price*i.quantity)}</strong><br><button class="btn btn-sm text-danger" onclick="Cart.remove('${i._id}')"><i class="bi bi-trash"></i></button></div></div>`).join('');
const ship=subtotal>=2000?0:99;const tax=Math.round(subtotal*0.05);const total=subtotal+ship+tax;
document.getElementById('cart-summary').innerHTML=`<h5>Summary</h5><div class="cart-summary-row"><span>Subtotal</span><span>${Utils.formatPrice(subtotal)}</span></div><div class="cart-summary-row"><span>Shipping</span><span>${ship?Utils.formatPrice(ship):'Free'}</span></div><div class="cart-summary-row"><span>Tax</span><span>${Utils.formatPrice(tax)}</span></div><div class="cart-summary-row cart-summary-total"><span>Total</span><span>${Utils.formatPrice(total)}</span></div><button class="btn-sanskriti w-100 mt-3" onclick="checkout()">Checkout</button>`;}catch{}}
async function checkout(){try{await api.orders.create({shippingAddress:{name:Auth.getUser()?.name,street:'123 Main St',city:'Mumbai',state:'Maharashtra',pincode:'400001',phone:'9876543210'},paymentMethod:'cod'});Utils.showToast('Order placed!','success');setTimeout(()=>location.href='/',2000);}catch(e){Utils.showToast(e.message,'error');}}
document.addEventListener('DOMContentLoaded',renderCart);window.renderCart=renderCart;
</script></body></html>
