<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | Sanskriti Market</title>
  <meta name="robots" content="noindex">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #F5F0E8; min-height: 100vh; display: flex; align-items: center; padding: 40px 0; font-family: Inter, sans-serif; }
    .auth-card { background: #fff; border-radius: 20px; padding: 48px 40px; max-width: 440px; margin: auto; box-shadow: 0 4px 40px rgba(139,41,66,0.12); }
    .brand { font-family: 'Playfair Display', serif; color: #8B2942; font-size: 1.8rem; text-align: center; margin-bottom: 8px; text-decoration: none; display: block; }
    .brand span { color: #C9A962; }
    .tagline { text-align: center; color: #999; font-size: 0.85rem; margin-bottom: 32px; }
    .form-control { border-radius: 10px; padding: 12px 16px; border: 1.5px solid #e8ddd0; font-size: 0.95rem; }
    .form-control:focus { border-color: #8B2942; box-shadow: 0 0 0 3px rgba(139,41,66,0.1); }
    .btn-main { background: #8B2942; color: #fff; border: none; border-radius: 12px; padding: 14px; width: 100%; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all .2s; }
    .btn-main:hover { background: #6d1f33; transform: translateY(-1px); }
    .back-link { display: block; text-align: center; margin-top: 20px; color: #8B2942; text-decoration: none; font-size: 0.9rem; }
    .back-link:hover { color: #6d1f33; }
    .alert { border-radius: 10px; font-size: 0.9rem; }
    .step-icon { width: 64px; height: 64px; background: #FFF5F7; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="auth-card">
      <a href="/" class="brand">Sanskriti <span>Market</span></a>
      <p class="tagline">Handcrafted in India. Treasured Worldwide.</p>

      <!-- Forgot Password Form -->
      <div id="forgot-section">
        <div class="step-icon">
          <i class="bi bi-envelope-fill" style="font-size:1.8rem;color:#8B2942"></i>
        </div>
        <h4 style="text-align:center;font-weight:600;margin-bottom:8px">Forgot Password?</h4>
        <p style="text-align:center;color:#999;font-size:0.9rem;margin-bottom:24px">No worries! Enter your email and we'll send you a reset link.</p>
        <div id="forgot-alert" class="alert" style="display:none"></div>
        <div class="mb-3">
          <label class="form-label fw-500">Email Address</label>
          <input type="email" class="form-control" id="forgot-email" placeholder="your@email.com">
        </div>
        <button class="btn-main" onclick="sendReset()">
          <i class="bi bi-send me-2"></i>Send Reset Link
        </button>
        <a href="/login.html" class="back-link"><i class="bi bi-arrow-left me-1"></i>Back to Login</a>
      </div>

      <!-- Success State -->
      <div id="success-section" style="display:none;text-align:center">
        <div class="step-icon" style="background:#e8f5e9">
          <i class="bi bi-check-circle-fill" style="font-size:1.8rem;color:#2e7d32"></i>
        </div>
        <h4 style="font-weight:600;margin-bottom:8px">Check Your Email!</h4>
        <p style="color:#666;line-height:1.7">We've sent a password reset link to <strong id="sent-email"></strong>. Check your inbox and spam folder.</p>
        <p style="color:#999;font-size:0.85rem;margin-top:16px">Link expires in 1 hour.</p>
        <a href="/login.html" class="btn-main d-block text-decoration-none text-center mt-4" style="padding:14px">Back to Login</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    async function sendReset() {
      const email = document.getElementById('forgot-email').value.trim();
      const alertEl = document.getElementById('forgot-alert');

      if (!email) {
        alertEl.className = 'alert alert-warning';
        alertEl.textContent = 'Please enter your email address.';
        alertEl.style.display = 'block';
        return;
      }

      try {
        await API.post('/api/auth/forgot-password', { email });
        document.getElementById('sent-email').textContent = email;
        document.getElementById('forgot-section').style.display = 'none';
        document.getElementById('success-section').style.display = 'block';
      } catch (e) {
        alertEl.className = 'alert alert-danger';
        alertEl.textContent = e.message || 'Something went wrong. Please try again.';
        alertEl.style.display = 'block';
      }
    }

    document.getElementById('forgot-email').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendReset();
    });
  </script>
</body>
</html>
