<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Sign In | Sanskriti Market</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="/css/main.css" rel="stylesheet"><link href="/css/components.css" rel="stylesheet">
</head>
<body>
<main class="auth-container"><div class="auth-card">
<a href="/" class="d-block text-center mb-4 navbar-brand" style="font-size:1.5rem">Sanskriti <span style="color:var(--secondary)">Market</span></a>
<h2>Welcome Back</h2><p class="subtitle">Sign in to continue your journey</p>
<form id="login-form"><div class="mb-3"><label class="form-label">Email</label><input type="email" class="form-control form-control-sanskriti" id="email" required></div>
<div class="mb-3"><label class="form-label">Password</label><input type="password" class="form-control form-control-sanskriti" id="password" required></div>
<button type="submit" class="btn-sanskriti w-100">Sign In</button></form>
<p class="text-center mt-3">No account? <a href="/register.html">Register</a></p></div></main>
<script src="/js/api.js"></script><script src="/js/auth.js"></script><script src="/js/main.js"></script>
<script>document.getElementById('login-form').addEventListener('submit',async e=>{e.preventDefault();try{await Auth.login(document.getElementById('email').value,document.getElementById('password').value);Utils.showToast('Welcome!','success');setTimeout(()=>location.href=Auth.getRedirectUrl(),500);}catch(err){Utils.showToast(err.message,'error');}});</script>
</body></html>
