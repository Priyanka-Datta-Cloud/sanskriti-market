<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Creator Store | Sanskriti Market</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="/css/main.css" rel="stylesheet"><link href="/css/components.css" rel="stylesheet">
</head>
<body>
<main id="store-page" style="padding-top:80px"><div class="text-center py-5"><div class="loading-spinner"></div></div></main>
<script src="/js/api.js"></script><script src="/js/auth.js"></script><script src="/js/main.js"></script><script src="/js/wishlist.js"></script>
<script>
async function loadStore(){const slug=new URLSearchParams(location.search).get('slug');if(!slug){location.href='/search.html';return;}
try{const r=await api.stores.getBySlug(slug);const s=r.data.store;const products=r.data.products||[];
document.title=s.name+' | Sanskriti Market';
document.getElementById('store-page').innerHTML=`<div class="store-banner"></div><div class="container" style="margin-top:-60px;position:relative;z-index:2;padding-bottom:3rem">
<div class="store-profile mb-4"><div class="store-logo">${s.name[0]}</div><div><h1>${s.name}</h1><p class="text-muted">${s.tagline||''}</p><div class="product-rating">${Utils.renderStars(s.rating)} · ${s.productCount} products</div></div></div>
<p class="mb-4">${s.description||''}</p><h3 class="mb-4">Products</h3><div class="product-grid" id="store-products"></div></div>`;
Utils.renderProductGrid(products,'store-products');}catch{document.getElementById('store-page').innerHTML='<div class="empty-state py-5"><h4>Store not found</h4></div>';}}
document.addEventListener('DOMContentLoaded',loadStore);
</script></body></html>
