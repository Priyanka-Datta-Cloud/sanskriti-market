<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Sanskriti Market</title>
  <meta name="robots" content="noindex">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="/css/main.css" rel="stylesheet">
  <style>
    body { background: #F5F0E8; min-height: 100vh; display: flex; align-items: center; padding: 40px 0; }
    .auth-card { background: #fff; border-radius: 20px; padding: 48px 40px; max-width: 440px; margin: auto; box-shadow: 0 4px 40px rgba(139,41,66,0.1); }
    .form-control:focus { border-color: #8B2942; box-shadow: 0 0 0 0.2rem rgba(139,41,66,0.15); }
    .btn-sanskriti { background: #8B2942; color: #fff; border: none; border-radius: 10px; padding: 12px; font-weight: 600; }
    .btn-sanskriti:hover { background: #6d1f33; color: #fff; }
  </style>
</head>
<body>
  <div class="container">
    <div class="auth-card">
      <div class="text-center mb-4">
        <a href="/" style="text-decoration:none">
          <h2 style="font-family:'Playfair Display',serif;color:#8B2942">Sanskriti Market</h2>
        </a>
      </div>

      <!-- Forgot Password Form -->
      <div id="forgot-section">
        <h4 class="mb-1" style="font-weight:600">Forgot Password?</h4>
        <p class="text-muted mb-4" style="font-size:0.9rem">Enter your email and we'll send a reset link.</p>
        <div id="forgot-alert" class="alert" style="display:none"></div>
        <div class="mb-3">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-control" id="forgot-email" placeholder="your@email.com">
        </div>
        <button class="btn btn-sanskriti w-100" onclick="sendReset()">Send Reset Link</button>
        <div class="text-center mt-3"><a href="/login.html" style="color:#8B2942;font-size:0.9rem">← Back to Login</a></div>
      </div>

      <!-- Reset Password Form -->
      <div id="reset-section" style="display:none">
        <h4 class="mb-1" style="font-weight:600">Set New Password</h4>
        <p class="text-muted mb-4" style="font-size:0.9rem">Choose a strong password for your account.</p>
        <div id="reset-alert" class="alert" style="display:none"></div>
        <div class="mb-3">
          <label class="form-label">New Password</label>
          <input type="password" class="form-control" id="new-password" placeholder="Min. 6 characters">
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-control" id="confirm-password" placeholder="Repeat your password">
        </div>
        <button class="btn btn-sanskriti w-100" onclick="resetPassword()">Reset Password</button>
      </div>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const token = params.get('token');
    if (token) {
      document.getElementById('forgot-section').style.display = 'none';
      document.getElementById('reset-section').style.display = 'block';
    }

    function showAlert(id, msg, type) {
      const el = document.getElementById(id);
      el.className = `alert alert-${type}`;
      el.textContent = msg;
      el.style.display = 'block';
    }

    async function sendReset() {
      const email = document.getElementById('forgot-email').value.trim();
      if (!email) return showAlert('forgot-alert', 'Please enter your email.', 'warning');
      try {
        await API.post('/api/auth/forgot-password', { email });
        showAlert('forgot-alert', 'Reset link sent! Check your email (including spam folder).', 'success');
      } catch (e) { showAlert('forgot-alert', e.message || 'Something went wrong.', 'danger'); }
    }

    async function resetPassword() {
      const password = document.getElementById('new-password').value;
      const confirm = document.getElementById('confirm-password').value;
      if (password.length < 6) return showAlert('reset-alert', 'Password must be at least 6 characters.', 'warning');
      if (password !== confirm) return showAlert('reset-alert', 'Passwords do not match.', 'warning');
      try {
        await API.post(`/api/auth/reset-password/${token}`, { password });
        showAlert('reset-alert', 'Password reset! Redirecting to login...', 'success');
        setTimeout(() => window.location.href = '/login.html', 2000);
      } catch (e) { showAlert('reset-alert', e.message || 'Link expired. Request a new one.', 'danger'); }
    }
  </script>
</body>
</html>
