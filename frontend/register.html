<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Register | Sanskriti Market</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/css/main.css" rel="stylesheet"><link href="/css/components.css" rel="stylesheet">
</head>
<body>
<main class="auth-container"><div class="auth-card">
<a href="/" class="d-block text-center mb-4 navbar-brand" style="font-size:1.5rem">Sanskriti <span style="color:var(--secondary)">Market</span></a>
<h2>Join Sanskriti</h2><p class="subtitle">Create your account</p>
<form id="register-form"><div class="mb-3"><label class="form-label">Full Name</label><input type="text" class="form-control form-control-sanskriti" id="name" required></div>
<div class="mb-3"><label class="form-label">Email</label><input type="email" class="form-control form-control-sanskriti" id="email" required></div>
<div class="mb-3"><label class="form-label">Password</label><input type="password" class="form-control form-control-sanskriti" id="password" minlength="6" required></div>
<div class="mb-3"><label class="form-label">Account Type</label><select class="form-select form-control-sanskriti" id="role"><option value="customer">Shop as Customer</option><option value="seller">Sell as Artisan</option></select></div>
<button type="submit" class="btn-sanskriti w-100">Create Account</button></form>
<p class="text-center mt-3">Have an account? <a href="/login.html">Sign In</a></p></div></main>
<script src="/js/api.js"></script><script src="/js/auth.js"></script><script src="/js/main.js"></script>
<script>
if(new URLSearchParams(location.search).get('role')==='seller')document.getElementById('role').value='seller';
document.getElementById('register-form').addEventListener('submit',async e=>{e.preventDefault();try{await Auth.register(document.getElementById('name').value,document.getElementById('email').value,document.getElementById('password').value,document.getElementById('role').value);Utils.showToast('Account created!','success');setTimeout(()=>location.href='/',500);}catch(err){Utils.showToast(err.message,'error');}});
</script></body></html>
