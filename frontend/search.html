<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Discover | Sanskriti Market</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="/css/main.css" rel="stylesheet"><link href="/css/components.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-sanskriti fixed-top"><div class="container"><a class="navbar-brand" href="/">Sanskriti <span>Market</span></a></div></nav>
<main class="container" style="padding-top:100px;padding-bottom:3rem"><h1 class="h3 mb-4">Discover Crafts</h1>
<form id="search-form" class="mb-4"><div class="search-box mx-auto" style="max-width:600px"><i class="bi bi-search"></i><input type="search" id="search-input" placeholder="Search products, stores..." autofocus></div></form>
<div id="search-results"></div></main>
<div id="chatbot-widget" class="chatbot-widget"></div>
<script src="/js/api.js"></script><script src="/js/auth.js"></script><script src="/js/main.js"></script><script src="/js/search.js"></script><script src="/js/chatbot.js"></script>
<script>
async function doSearch(q){if(!q)return;document.getElementById('search-results').innerHTML='<div class="loading-spinner mx-auto"></div>';
const r=await Search.perform(q);if(!r)return;let h='';
if(r.products?.length)h+='<h4>Products</h4><div class="product-grid mb-4">'+r.products.map(p=>Utils.renderProductCard(p)).join('')+'</div>';
if(r.stores?.length)h+='<h4>Stores</h4><div class="row g-3">'+r.stores.map(s=>`<div class="col-md-4"><a href="/store.html?slug=${s.slug}" class="text-decoration-none"><div class="category-card"><div class="category-name">${s.name}</div><p class="category-desc">${s.tagline||''}</p></div></a></div>`).join('')+'</div>';
document.getElementById('search-results').innerHTML=h||'<div class="empty-state"><h4>No results</h4></div>';}
document.getElementById('search-form').addEventListener('submit',e=>{e.preventDefault();doSearch(document.getElementById('search-input').value);});
const q=new URLSearchParams(location.search).get('q');if(q){document.getElementById('search-input').value=q;doSearch(q);}
</script></body></html>
