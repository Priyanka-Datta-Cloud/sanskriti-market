<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Products | Sanskriti Market</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="/css/main.css" rel="stylesheet"><link href="/css/components.css" rel="stylesheet">
</head>
<body>
<div class="dashboard-sidebar" style="background:#1A1A2E"><div class="brand">Sanskriti Admin</div>
<ul class="sidebar-nav"><li><a href="/admin/dashboard.html"><i class="bi bi-grid"></i> Dashboard</a></li>
<li><a href="/admin/users.html"><i class="bi bi-people"></i> Users</a></li>
<li><a href="/admin/products.html" class="active"><i class="bi bi-box"></i> Products</a></li>
<li><a href="/admin/orders.html"><i class="bi bi-receipt"></i> Orders</a></li></ul></div>
<div class="dashboard-main"><h2 class="mb-4">All Products</h2>
<div class="table-sanskriti"><table class="table mb-0"><thead><tr><th>Product</th><th>Seller</th><th>Price</th><th>Featured</th><th>Actions</th></tr></thead><tbody id="products-table"></tbody></table></div></div>
<script src="/js/api.js"></script><script src="/js/auth.js"></script><script src="/js/main.js"></script>
<script>document.addEventListener('DOMContentLoaded',async()=>{if(!Auth.requireRole('admin'))return;const r=await api.admin.products();
document.getElementById('products-table').innerHTML=(r.data||[]).map(p=>`<tr><td>${p.name}</td><td>${p.seller?.name||'-'}</td><td>${Utils.formatPrice(p.price)}</td><td>${p.isFeatured?'Yes':'No'}</td><td><button class="btn btn-sm btn-outline-sanskriti" onclick="api.admin.toggleFeatured('${p._id}').then(()=>location.reload())">Toggle Featured</button></td></tr>`).join('');});</script></body></html>
