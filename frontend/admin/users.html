<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Users | Sanskriti Market</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="/css/main.css" rel="stylesheet"><link href="/css/components.css" rel="stylesheet">
</head>
<body>
<div class="dashboard-sidebar" style="background:#1A1A2E"><div class="brand">Sanskriti Admin</div>
<ul class="sidebar-nav"><li><a href="/admin/dashboard.html"><i class="bi bi-grid"></i> Dashboard</a></li>
<li><a href="/admin/users.html" class="active"><i class="bi bi-people"></i> Users</a></li>
<li><a href="/admin/products.html"><i class="bi bi-box"></i> Products</a></li>
<li><a href="/admin/orders.html"><i class="bi bi-receipt"></i> Orders</a></li></ul></div>
<div class="dashboard-main"><h2 class="mb-4">Users</h2>
<div class="table-sanskriti"><table class="table mb-0"><thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Change Role</th></tr></thead><tbody id="users-table"></tbody></table></div></div>
<script src="/js/api.js"></script><script src="/js/auth.js"></script><script src="/js/main.js"></script>
<script>
async function load(){const r=await api.admin.users();document.getElementById('users-table').innerHTML=(r.data||[]).map(u=>`<tr><td>${u.name}</td><td>${u.email}</td><td>${u.role}</td><td><span class="status-badge ${u.isActive?'confirmed':'cancelled'}">${u.isActive?'Active':'Inactive'}</span></td><td><select class="form-select form-select-sm" onchange="api.admin.updateUser('${u._id}',{role:this.value}).then(()=>Utils.showToast('Updated','success'))"><option value="customer" ${u.role==='customer'?'selected':''}>Customer</option><option value="seller" ${u.role==='seller'?'selected':''}>Seller</option><option value="admin" ${u.role==='admin'?'selected':''}>Admin</option></select></td></tr>`).join('');}
document.addEventListener('DOMContentLoaded',()=>{if(Auth.requireRole('admin'))load();});
</script></body></html>
