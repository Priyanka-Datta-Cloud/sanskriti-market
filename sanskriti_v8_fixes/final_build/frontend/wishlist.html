<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Wishlist | Sanskriti Market</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="/css/main.css" rel="stylesheet"><link href="/css/components.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-sanskriti fixed-top"><div class="container"><a class="navbar-brand" href="/">Sanskriti <span>Market</span></a></div></nav>
<main class="container" style="padding-top:100px;padding-bottom:3rem"><h1 class="h3 mb-4">My Wishlist</h1>
<div class="product-grid" id="wishlist-grid"><div class="loading-spinner mx-auto"></div></div></main>
<script src="/js/api.js"></script><script src="/js/auth.js"></script><script src="/js/main.js"></script><script src="/js/wishlist.js"></script>
<script>
async function renderWishlist(){if(!Auth.requireAuth())return;try{const r=await api.wishlist.get();const products=r.data.wishlist?.products||[];
if(!products.length){document.getElementById('wishlist-grid').innerHTML='<div class="empty-state col-12"><i class="bi bi-heart"></i><h4>Wishlist is empty</h4><a href="/products.html" class="btn-sanskriti">Discover Products</a></div>';return;}
Utils.renderProductGrid(products,'wishlist-grid');}catch{}}
document.addEventListener('DOMContentLoaded',renderWishlist);window.renderWishlist=renderWishlist;
</script></body></html>
