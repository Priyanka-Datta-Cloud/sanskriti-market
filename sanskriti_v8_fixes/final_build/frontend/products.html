<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="description" content="Browse handcrafted Indian products at Sanskriti Market">
<title>Shop | Sanskriti Market</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="/css/main.css" rel="stylesheet"><link href="/css/components.css" rel="stylesheet"><link href="/css/animations.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-sanskriti fixed-top"><div class="container">
<a class="navbar-brand" href="/">Sanskriti <span>Market</span></a>
<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
<div class="collapse navbar-collapse" id="navbarNav">
<ul class="navbar-nav mx-auto"><li class="nav-item"><a class="nav-link" href="/">Home</a></li><li class="nav-item"><a class="nav-link active" href="/products.html">Shop</a></li><li class="nav-item"><a class="nav-link" href="/search.html">Discover</a></li><li class="nav-item"><a class="nav-link" href="/about.html">Our Story</a></li></ul>
<div class="d-flex align-items-center gap-2"><a href="/wishlist.html" class="nav-icon-btn"><i class="bi bi-heart"></i><span class="badge-count" id="wishlist-count" style="display:none">0</span></a><a href="/cart.html" class="nav-icon-btn"><i class="bi bi-bag"></i><span class="badge-count" id="cart-count" style="display:none">0</span></a><a href="/login.html" class="btn btn-outline-sanskriti btn-sm" id="nav-login">Sign In</a></div>
</div></div></nav>
<main class="container" style="padding-top:100px;padding-bottom:3rem">
<div class="row"><aside class="col-lg-3 mb-4"><div class="filter-sidebar"><h5>Filters</h5>
<div class="filter-group"><h6>Category</h6>
<label class="filter-option"><input type="radio" name="category" value="" checked> All</label>
<label class="filter-option"><input type="radio" name="category" value="textiles"> Textiles</label>
<label class="filter-option"><input type="radio" name="category" value="pottery"> Pottery</label>
<label class="filter-option"><input type="radio" name="category" value="jewelry"> Jewelry</label>
<label class="filter-option"><input type="radio" name="category" value="paintings"> Paintings</label>
<label class="filter-option"><input type="radio" name="category" value="home-decor"> Home Decor</label>
<label class="filter-option"><input type="radio" name="category" value="sculptures"> Sculptures</label>
<label class="filter-option"><input type="radio" name="category" value="toys"> Toys</label>
<label class="filter-option"><input type="radio" name="category" value="other"> Spices, Food & Books</label></div>
<select id="sort-select" class="form-select form-control-sanskriti mb-3"><option value="">Newest</option><option value="popular">Popular</option><option value="price-asc">Price Low-High</option><option value="rating">Top Rated</option></select>
<button class="btn-sanskriti btn-sm w-100" onclick="loadProducts(1)">Apply Filters</button></div></aside>
<div class="col-lg-9"><h1 class="h3 mb-4">All Products <small class="text-muted" id="product-count"></small></h1>
<div class="product-grid" id="products-grid"><div class="loading-spinner mx-auto"></div></div>
<nav id="pagination" class="mt-4"></nav></div></div></main>
<footer class="footer"><div class="container text-center"><p class="footer-brand">Sanskriti Market</p><p class="footer-tagline">Handcrafted in India. Treasured Worldwide.</p><p>&copy; 2026 Sanskriti Market</p></div></footer>
<div id="chatbot-widget" class="chatbot-widget"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/api.js"></script><script src="/js/auth.js"></script><script src="/js/main.js"></script>
<script src="/js/cart.js"></script><script src="/js/wishlist.js"></script><script src="/js/search.js"></script><script src="/js/chatbot.js"></script><script src="/js/recommendations.js"></script>
<script>
async function loadProducts(page=1){const p=new URLSearchParams();p.set('page',page);p.set('limit',12);
const c=document.querySelector('input[name=category]:checked')?.value;if(c)p.set('category',c);
const s=document.getElementById('sort-select').value;if(s)p.set('sort',s);
if(new URLSearchParams(location.search).get('featured')==='true')p.set('featured','true');
try{const r=await api.products.getAll(p.toString());Utils.renderProductGrid(r.data,'products-grid');
document.getElementById('product-count').textContent=r.pagination?'('+r.pagination.total+')':'';}catch{document.getElementById('products-grid').innerHTML='<div class="empty-state"><h4>Unable to load products</h4></div>';}}
document.addEventListener('DOMContentLoaded',()=>{const cat=new URLSearchParams(location.search).get('category');if(cat){const r=document.querySelector('input[value="'+cat+'"]');if(r)r.checked=true;}loadProducts();});
</script></body></html>
