<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Orders | Sanskriti Market</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="/css/main.css" rel="stylesheet"><link href="/css/components.css" rel="stylesheet">
</head>
<body>
<div class="dashboard-sidebar" style="background:#1A1A2E"><div class="brand">Sanskriti Admin</div>
<ul class="sidebar-nav"><li><a href="/admin/dashboard.html"><i class="bi bi-grid"></i> Dashboard</a></li>
<li><a href="/admin/users.html"><i class="bi bi-people"></i> Users</a></li>
<li><a href="/admin/products.html"><i class="bi bi-box"></i> Products</a></li>
<li><a href="/admin/orders.html" class="active"><i class="bi bi-receipt"></i> Orders</a></li></ul></div>
<div class="dashboard-main"><h2 class="mb-4">All Orders</h2>
<div class="table-sanskriti"><table class="table mb-0"><thead><tr><th>Order #</th><th>Customer</th><th>Total</th><th>Status</th><th>Update</th></tr></thead><tbody id="orders-table"></tbody></table></div></div>
<script src="/js/api.js"></script><script src="/js/auth.js"></script><script src="/js/main.js"></script>
<script>document.addEventListener('DOMContentLoaded',async()=>{if(!Auth.requireRole('admin'))return;const r=await api.admin.orders();
document.getElementById('orders-table').innerHTML=(r.data||[]).map(o=>`<tr><td>${o.orderNumber}</td><td>${o.user?.name||'-'}</td><td>${Utils.formatPrice(o.total)}</td><td><span class="status-badge ${o.status}">${o.status}</span></td><td><select class="form-select form-select-sm" onchange="api.orders.updateStatus('${o._id}',{status:this.value}).then(()=>Utils.showToast('Updated','success'))"><option value="pending" ${o.status==='pending'?'selected':''}>Pending</option><option value="confirmed" ${o.status==='confirmed'?'selected':''}>Confirmed</option><option value="shipped" ${o.status==='shipped'?'selected':''}>Shipped</option><option value="delivered" ${o.status==='delivered'?'selected':''}>Delivered</option></select></td></tr>`).join('');});</script></body></html>
